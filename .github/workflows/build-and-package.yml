name: Build and Package

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: posterm

jobs:
  build-test-package:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal

      - name: Use stable Rust
        run: rustup default stable

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package Linux binary
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p dist
          tar -czf "dist/${BINARY_NAME}-linux.tar.gz" -C target/release "${BINARY_NAME}"

      - name: Package macOS binary and PKG installer
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p dist
          tar -czf "dist/${BINARY_NAME}-macos.tar.gz" -C target/release "${BINARY_NAME}"
          rm -rf pkgroot
          mkdir -p pkgroot/usr/local/bin
          cp "target/release/${BINARY_NAME}" "pkgroot/usr/local/bin/${BINARY_NAME}"
          chmod 755 "pkgroot/usr/local/bin/${BINARY_NAME}"
          pkgbuild \
            --root pkgroot \
            --identifier "io.github.posterm.${BINARY_NAME}" \
            --version "${{ github.run_number }}" \
            --install-location "/" \
            "dist/${BINARY_NAME}-macos.pkg"

      - name: Install WiX Toolset
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          $wixPath = "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin"
          if (Test-Path $wixPath) {
            $wixPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Build Windows MSI installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cargo install cargo-wix --locked
          cargo wix --no-build
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Compress-Archive -Path "target\release\${env:BINARY_NAME}.exe" -DestinationPath "dist\${env:BINARY_NAME}-windows.zip" -Force
          $msi = Get-ChildItem -Path target\wix -Filter *.msi | Select-Object -First 1
          if (-not $msi) {
            throw "MSI file was not generated by cargo wix"
          }
          Copy-Item $msi.FullName "dist\${env:BINARY_NAME}-windows.msi"

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.os }}
          path: dist/${{ env.BINARY_NAME }}-linux.tar.gz
          if-no-files-found: error

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.os }}
          path: |
            dist/${{ env.BINARY_NAME }}-macos.tar.gz
            dist/${{ env.BINARY_NAME }}-macos.pkg
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.os }}
          path: |
            dist/${{ env.BINARY_NAME }}-windows.zip
            dist/${{ env.BINARY_NAME }}-windows.msi
          if-no-files-found: error
