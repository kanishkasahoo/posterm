name: Build and Package

# POSTERM_UPDATE_SIGNING_KEY may be set as a repository secret.
# It must be a base64-encoded raw 32-byte Ed25519 seed.

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: posterm

jobs:
  build-linux:
    name: Build Linux
    runs-on: docker

    steps:
      - name: Checkout source
        uses: https://data.forgejo.org/actions/checkout@v4
        with:
          persist-credentials: false

      - name: Read version from Cargo.toml
        id: read_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "RELEASE_VERSION=v${VERSION}" >> "$GITHUB_ENV"

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal

      - name: Use stable Rust
        run: rustup default stable

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package Linux binary
        run: |
          mkdir -p dist
          tar -czf "dist/${BINARY_NAME}-linux.tar.gz" -C target/release "${BINARY_NAME}"

      - name: Generate Linux tarball SHA-256 checksum
        run: |
          sha256sum "dist/${BINARY_NAME}-linux.tar.gz" \
            | awk '{print $1}' \
            > "dist/${BINARY_NAME}-linux.tar.gz.sha256"

      - name: Sign Linux binary
        env:
          POSTERM_UPDATE_SIGNING_KEY: ${{ secrets.POSTERM_UPDATE_SIGNING_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, sys, base64

          binary_name = os.environ["BINARY_NAME"]
          binary_path = f"target/release/{binary_name}"
          sig_path = f"dist/{binary_name}-linux.tar.gz.sig"

          secret = os.environ.get("POSTERM_UPDATE_SIGNING_KEY", "").strip()
          if not secret:
              print("WARNING: POSTERM_UPDATE_SIGNING_KEY is absent; skipping .sig generation.", flush=True)
              sys.exit(0)

          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey

          seed = base64.b64decode(secret)
          privkey = Ed25519PrivateKey.from_private_bytes(seed)

          with open(binary_path, "rb") as fh:
              payload = fh.read()

          signature = privkey.sign(payload)

          with open(sig_path, "wb") as fh:
              fh.write(signature)

          print(f"Ed25519 signature written to {sig_path} ({len(signature)} bytes)", flush=True)
          PYEOF

      - name: Upload Linux artifacts
        uses: https://data.forgejo.org/actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-linux
          path: |
            dist/${{ env.BINARY_NAME }}-linux.tar.gz
            dist/${{ env.BINARY_NAME }}-linux.tar.gz.sha256
            dist/${{ env.BINARY_NAME }}-linux.tar.gz.sig
          if-no-files-found: warn
